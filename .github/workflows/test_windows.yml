name: Test on Windows (Real Image)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu
        pip install opencv-python Pillow numpy cellpose==3.0.11

    - name: Download test image
      run: |
        curl -L -o test_cell.tif "https://cdn.discordapp.com/attachments/1151215465557921952/1495809183675846696/0058.tif?ex=69e7985c&is=69e646dc&hm=2db86a4321705a1c1a9a953b997a96c715cc0076df2fbfab3b80e2e14dcd4613&"
        python -c "import os; print('Image size:', os.path.getsize('test_cell.tif'), 'bytes')"

    - name: Run headless cell detection test
      run: python test_headless.py

    - name: Run two-pass diameter test
      run: python test_twopass.py

    - name: Upload result image
      uses: actions/upload-artifact@v4
      with:
        name: TestResult
        path: result.jpg
