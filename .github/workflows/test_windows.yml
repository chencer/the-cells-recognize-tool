name: Test on Windows (Real Image)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu
        pip install opencv-python Pillow numpy cellpose==3.0.11

    - name: Use test image from repo
      run: |
        copy test_images\wide_test.jpg test_cell.jpg
        python -c "import os; print('Image size:', os.path.getsize('test_cell.jpg'), 'bytes')"
      shell: cmd

    - name: Run headless cell detection test
      run: python test_headless.py
      env:
        PYTHONUTF8: "1"

    - name: Upload result image
      uses: actions/upload-artifact@v4
      with:
        name: TestResult
        path: result.jpg
