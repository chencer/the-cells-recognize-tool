name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 升级到 v4

    - name: Set up Python
      uses: actions/setup-python@v5 # 升级到 v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 重点：安装 CPU 版 Torch 以减小体积并提高打包成功率
        pip install torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu
        pip install opencv-python Pillow numpy cellpose==3.0.11 pyinstaller

    - name: Build EXE
      run: |
        # 确保 cyto3 文件在根目录
        pyinstaller --noconsole --onefile --add-data "cyto3;." cells_find.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4  # 核心修复：升级到 v4
      with:
        name: Windows_Program
        path: dist/cells_find.exe
